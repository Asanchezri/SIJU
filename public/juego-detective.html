<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJU - El Detective</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }

        .btn-accion {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 15px;
            border: none; 
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .btn-volver { background: #e2e8f0; color: #475569; }
        .btn-volver:active { transform: scale(0.95); }

        .btn-jugar { background: #8b5cf6; color: white; box-shadow: 0 6px 0 #7c3aed; font-size: 16px;}
        .btn-jugar:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }

        h1 { color: #8b5cf6; font-weight: 800; font-size: 2em; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .instrucciones { color: #64748b; font-size: 1.1em; font-weight: 700; margin-bottom: 20px;}

        #vista-estudio { display: block; }
        
        #contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .tarjeta {
            background: white;
            border: 4px solid #e2e8f0;
            border-radius: 20px;
            width: 260px; 
            padding: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .tarjeta:hover { transform: translateY(-4px); border-color: #cbd5e1;}
        
        .tarjeta-media {
            display: flex;
            gap: 10px;
            height: 110px; 
            margin-bottom: 12px;
        }

        .img-estudio {
            width: 50%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            background-color: #f1f5f9;
            padding: 5px;
            box-sizing: border-box;
        }

        .sin-media {
            width: 50%;
            height: 100%;
            border-radius: 10px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            box-sizing: border-box;
            text-align: center;
            padding: 5px;
        }

        .tarjeta-texto { font-weight: 800; font-size: 18px; color: #334155; text-transform: uppercase;}

        #vista-juego { display: none; margin-top: 20px; }
        #vista-fin { display: none; margin-top: 20px; }

        .imagen-detective-contenedor {
            width: 280px;
            height: 280px;
            margin: 0 auto 30px auto;
            background: white;
            border-radius: 30px;
            border: 6px solid #8b5cf6;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            position: relative;
        }
        
        .lupa-icono {
            position: absolute;
            bottom: -15px;
            right: -15px;
            background: #f59e0b;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .imagen-detective {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
        }

        .opciones-contenedor {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 0 auto;
        }

        .opcion-texto {
            background: white;
            border: 4px solid #e2e8f0;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: 800;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }
        
        .opcion-texto:hover { transform: translateY(-4px); border-color: #94a3b8; }
        .opcion-texto:active { transform: translateY(2px); box-shadow: none; }
        
        .acierto { border-color: #10b981 !important; background: #10b981; color: white !important; transform: scale(1.05); }
        .fallo { border-color: #ef4444 !important; background: #fef2f2; color: #ef4444; animation: temblor 0.4s; }

        @keyframes temblor {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }

        .pantalla-fin { animation: aparecer 0.5s ease-out; }
        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="nav-superior">
        <a id="link-volver" href="#" class="btn-accion btn-volver">Volver al Mapa</a>
        <button id="btn-cambiar-modo" onclick="empezarJuego()" class="btn-accion btn-jugar">🔍 Empezar Investigación</button>
    </div>

    <h1>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        El Detective
    </h1>
    <h2 id="titulo-ronda" style="color: #64748b; margin-top: 0; font-size: 1.1em;">Cargando...</h2>
    
    <div id="vista-estudio">
        <p class="instrucciones">Estudia las pistas antes de la investigación</p>
        <div id="contenedor-tarjetas"></div>
    </div>

    <div id="vista-juego">
        <p class="instrucciones">¿Qué palabra describe esta imagen?</p>
        
        <div class="imagen-detective-contenedor" id="contenedor-imagen-pregunta"></div>

        <div id="contenedor-opciones" class="opciones-contenedor"></div>
        <br><br>
        <button onclick="volverAEstudio()" class="btn-accion btn-volver" style="background:#94a3b8; color:white;">Parar y Estudiar</button>
    </div>

    <div id="vista-fin"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nivelActual = params.get('nivel');
        const edadAlumno = params.get('edad');
        const alumnoId = params.get('alumno');
        const tipoJugador = params.get('tipo') || 'alumno'; 
        
        let palabrasPiscina = []; 
        let palabrasPartida = []; 
        let palabrasPendientes = []; 
        let preguntaActual = null; 
        let rondaActual = 0;
        const PALABRAS_POR_RONDA = 3;

        document.getElementById('link-volver').href = `index.html?edad=${edadAlumno}&alumno=${alumnoId}&tipo=${tipoJugador}`;

        async function cargarDatos() {
            try {
                const usuarioLogueado = JSON.parse(localStorage.getItem('usuarioSiju'));
                let url = `/diccionario?edad=${edadAlumno}`;
                if (usuarioLogueado && usuarioLogueado.rol === 'docente') {
                    url += `&docente=${usuarioLogueado.id}`;
                } else if (alumnoId) {
                    url += `&alumno=${alumnoId}`;
                }

                const response = await fetch(url);
                const todas = await response.json();
                
                palabrasPiscina = todas.filter(p => {
                    if (!p.nivel) return nivelActual == 1;
                    const nStr = p.nivel.toString().toLowerCase().trim();
                    if (nivelActual == 1) return nStr === '1' || nStr === 'básico' || nStr === 'basico';
                    if (nivelActual == 2) return nStr === '2' || nStr === 'medio';
                    if (nivelActual == 3) return nStr === '3' || nStr === 'difícil' || nStr === 'dificil';
                    return false;
                });

                if (palabrasPiscina.length < 3) {
                    document.getElementById('contenedor-tarjetas').innerHTML = '<h3 style="color:#64748b;">Necesitas al menos 3 palabras para jugar.</h3>';
                    document.getElementById('btn-cambiar-modo').style.display = 'none';
                    return;
                }

                palabrasPiscina.sort(() => Math.random() - 0.5);
                iniciarRonda();

            } catch (e) { console.error(e); }
        }

        function iniciarRonda() {
            const inicio = rondaActual * PALABRAS_POR_RONDA;
            const fin = inicio + PALABRAS_POR_RONDA;
            
            palabrasPartida = palabrasPiscina.slice(inicio, fin);

            document.getElementById('titulo-ronda').innerText = `Ronda ${rondaActual + 1}`;
            
            pintarModoEstudio(); 
            
            document.getElementById('vista-estudio').style.display = 'block';
            document.getElementById('vista-juego').style.display = 'none';
            document.getElementById('vista-fin').style.display = 'none';
            document.getElementById('btn-cambiar-modo').style.display = 'block';
        }

        function pintarModoEstudio() {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = '';

            palabrasPartida.forEach(item => {
                const div = document.createElement('div');
                div.className = 'tarjeta';
                
                const urlImg = item.url_imagen || item.ruta_concepto;
                const urlGif = item.url_video || item.ruta_signo;

                const htmlImg = urlImg ? `<img src="${urlImg}" class="img-estudio" title="Concepto">` : `<div class="sin-media">Sin Imagen</div>`;
                const htmlGif = urlGif ? `<img src="${urlGif}" class="img-estudio" title="Signo (GIF)">` : `<div class="sin-media">Sin GIF</div>`;

                div.innerHTML = `
                    <div class="tarjeta-media">
                        ${htmlImg}
                        ${htmlGif}
                    </div>
                    <div class="tarjeta-texto">${item.palabra}</div>
                `;
                contenedor.appendChild(div);
            });
        }

        function empezarJuego() {
            document.getElementById('vista-estudio').style.display = 'none';
            document.getElementById('vista-juego').style.display = 'block';
            document.getElementById('btn-cambiar-modo').style.display = 'none'; 
            
            palabrasPendientes = [...palabrasPartida]; 
            generarPregunta();
        }

        function generarPregunta() {
            if (palabrasPendientes.length === 0) {
                mostrarFinDeRonda();
                return;
            }

            preguntaActual = palabrasPendientes[Math.floor(Math.random() * palabrasPendientes.length)];

            const contImagen = document.getElementById('contenedor-imagen-pregunta');
            let imgHTML = '';
            
            const opcionesMedia = [];
            if (preguntaActual.url_imagen || preguntaActual.ruta_concepto) opcionesMedia.push(preguntaActual.url_imagen || preguntaActual.ruta_concepto);
            if (preguntaActual.url_video || preguntaActual.ruta_signo) opcionesMedia.push(preguntaActual.url_video || preguntaActual.ruta_signo);
            
            if (opcionesMedia.length > 0) {
                const medioElegido = opcionesMedia[Math.floor(Math.random() * opcionesMedia.length)];
                imgHTML = `<img src="${medioElegido}" class="imagen-detective">`;
            } else {
                imgHTML = `<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`;
            }

            contImagen.innerHTML = imgHTML + `
            <div class="lupa-icono">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>`;

            let opciones = [...palabrasPartida];
            opciones.sort(() => Math.random() - 0.5);

            const contenedorOps = document.getElementById('contenedor-opciones');
            contenedorOps.innerHTML = '';

            opciones.forEach(opcion => {
                const btn = document.createElement('div');
                btn.className = 'opcion-texto';
                btn.innerText = opcion.palabra; 
                btn.onclick = () => verificarRespuesta(btn, opcion);
                contenedorOps.appendChild(btn);
            });
        }

        function lanzarConfeti() {
            var duration = 2000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 8, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#eab308'] });
                confetti({ particleCount: 8, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#eab308'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        async function verificarRespuesta(elementoHTML, opcionElegida) {
            if(elementoHTML.classList.contains('acierto')) return;

            if (opcionElegida.id === preguntaActual.id) {
                elementoHTML.classList.add('acierto');
                guardarProgreso(preguntaActual.id);
                palabrasPendientes = palabrasPendientes.filter(p => p.id !== preguntaActual.id);
                setTimeout(() => { generarPregunta(); }, 800);
            } else {
                elementoHTML.classList.add('fallo');
                setTimeout(() => elementoHTML.classList.remove('fallo'), 400);
            }
        }

        function mostrarFinDeRonda() {
            document.getElementById('vista-juego').style.display = 'none';
            const vistaFin = document.getElementById('vista-fin');
            vistaFin.style.display = 'block';

            const quedanMas = (rondaActual + 1) * PALABRAS_POR_RONDA < palabrasPiscina.length;
            const medallaSVG = `<svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;

            if (quedanMas) {
                lanzarConfeti();
                vistaFin.innerHTML = `
                    <div class="pantalla-fin">
                        ${medallaSVG}
                        <h2 style="font-size: 38px; color: #8b5cf6; margin: 0 0 10px 0;">¡Pistas Encontradas!</h2>
                        <p style="font-size: 20px; color: #64748b; font-weight: 600;">El caso aún no está cerrado, detective.</p>
                        <button onclick="siguienteRonda()" class="btn-accion btn-jugar" style="display:inline-block; margin-top:25px; padding: 15px 35px;">Siguiente Caso</button>
                    </div>
                `;
            } else {
                confetti({ particleCount: 150, spread: 180, origin: { y: 0.1 } });
                vistaFin.innerHTML = `
                    <div class="pantalla-fin">
                        ${medallaSVG}
                        <h2 style="font-size: 38px; color: #8b5cf6; margin: 0 0 10px 0;">¡Caso Resuelto!</h2>
                        <p style="font-size: 20px; color: #64748b; font-weight: 600;">Eres el mejor detective de palabras.</p>
                        <a href="index.html?edad=${edadAlumno}&alumno=${alumnoId}&tipo=${tipoJugador}" class="btn-accion btn-jugar" style="display:inline-block; margin-top:25px; padding: 15px 35px;">Volver al Mapa</a>
                        <button onclick="location.reload()" class="btn-accion btn-volver" style="display:inline-block; margin-top:25px; margin-left:15px; padding: 15px 35px;">Investigar Otra Vez</button>
                    </div>
                `;
            }
        }

        function siguienteRonda() { rondaActual++; iniciarRonda(); }

        function volverAEstudio() {
            document.getElementById('vista-estudio').style.display = 'block';
            document.getElementById('vista-juego').style.display = 'none';
            document.getElementById('btn-cambiar-modo').style.display = 'block';
        }

        async function guardarProgreso(idSigno) {
            if (!alumnoId || !tipoJugador) return;
            try {
                await fetch('/api/guardar-progreso', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_jugador: alumnoId, tipo: tipoJugador, id_signo: idSigno })
                });
            } catch (e) { console.error(e); }
        }

        cargarDatos();
    </script>
</body>
</html>
